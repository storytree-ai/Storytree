# storytree corpus unit — capability. THIS yaml is the source of truth; the markdown view is
# generated from it (ADR-0013). Data is structured; prose lives in typed fields (proof_note,
# guidance[].note, integration_test step action/success, contracts[].asserts) as rendered
# markdown — never a freeform body.
id: browse-library
tier: capability
story: studio-foundation
title: Browse and view the guidance Library
outcome: An operator explores the seeded guidance Library down to a single rendered artifact.
status: proposed
proof_mode: integration-test
depends_on:
  - dev-server-persistence-backbone
  - seed-library-corpus
  - read-corpus

proof_note: |
  CODE EXISTS AND RUNS, NO AUTOMATED PROOF YET. All read-side behaviours are implemented and
  the studio runs under `pnpm --filter studio dev` serving the real 88-artifact seed; the full
  integration path (open `#/library` → narrow by chip → substring-search → open `#/asset/<id>`
  → follow a `doc:` ref to `#/doc/<relpath>`) is manually walkable today. But apps/studio has
  NO automated test suite and NO scripted integration test: none of the 11 contracts exist as
  tests, and the integration test is unscripted. RETROSPECTIVE spec — nothing here is 'proven'
  or 'healthy', only present and exercised by hand.

guidance:
  - id: hash-router-encodes-ids
    scope: { contract: bl-asset-route-parses-id }
    note: >
      Routing is a dependency-free custom hash router (`route.ts`): doc/asset ids are
      URI-encoded into a single hash segment so slashes in doc relpaths (e.g.
      `decisions/0002-...md`) don't break parsing.
  - id: filter-and-search-one-memo
    scope: { contract: bl-search-substring-filters-across-fields }
    note: >
      The category-filter and the substring-search live in ONE `useMemo` over the same assets
      array (`Library.tsx:14-24`); the search is a literal `String.includes` over a lowercased
      `id title description body` haystack — describe it at that fidelity, NOT as ranked
      relevance.
  - id: chip-counts-mirrored-in-sidebar
    scope: { contract: bl-chip-count-reflects-live-category-size }
    note: >
      Chip counts are computed inline by re-filtering the assets array per category
      (`Library.tsx:48`); a category with `n===0` renders no chip (`Library.tsx:49`). The same
      per-category-count surface is mirrored in `Sidebar.tsx:26-41`, so they share the live
      counts.
  - id: closed-seven-category-taxonomy
    note: >
      The taxonomy is a closed 7-category schema, not a unit: `AssetCategory` union +
      `ASSET_CATEGORIES` order + `ASSET_CATEGORY_GLOSS` map (`types.ts:67-74,128-147`) —
      chips/gloss/route-guard consume it but it is observed only THROUGH them. The seven —
      definition, principle, pattern, guardrail, techstack, template, adr — of which six are
      seeded; `adr` is defined-but-unseeded, so it renders no chip (the `n===0` guard).
  - id: reflink-not-live-revalidation
    scope: { contract: bl-reflink-resolves-known-doc-ref }
    note: >
      RefLink resolution is NOT live re-validation: it reads docIds/docTitles that
      `App.tsx:58-59` derives once from the doc index into the shared AppData context
      (`appData.ts:8-16`); an unknown ref degrades gracefully to a muted '(unknown doc/asset)'
      span.
  - id: seed-reality-asset-branch-dead
    scope: { contract: bl-reflink-resolves-known-asset-ref }
    note: >
      SEED REALITY (verified against `apps/studio/data/assets.json`): exactly 88 artifacts
      (definition 54, pattern 11, guardrail 8, principle 5, techstack 4, template 6), 81 carry
      references, 137 `doc:` refs, and 0 `asset:` refs — so the `asset:` branch of RefLink
      (`AssetView.tsx:114-122`) is real but DEAD under the seed; the honest minimal integration
      test follows a `doc:` ref (e.g. `deep-modules` → `doc:decisions/0002-...md`).

integration_test:
  goal: >
    An operator starts at the Library landing, narrows the seeded artifact corpus by category
    and free-text search, opens one artifact, and follows its doc citation to land on the cited
    ADR in-app — proving the whole read-side of the Library end-to-end against its real
    in-story collaborators (seed-library-corpus's assets.json, the persistence backbone
    middleware, and read-corpus's DocView), with no stubs within the organism (ADR-0010).
  steps:
    - action: Start the studio (`pnpm --filter studio dev`) and open `#/library`.
      success: >
        The grid renders with the 'all (88)' chip active, plus one chip per non-empty category
        (definition 54, pattern 11, guardrail 8, principle 5, techstack 4, template 6). No chip
        for the defined-but-unseeded 'adr' category (n===0). No category gloss banner yet.
    - action: Click the 'definition' category chip.
      success: >
        The route becomes `#/library/definition`, the grid narrows to the 54 definition
        artifacts, the 'definition' chip is active, and the one-line gloss banner reads
        'definition — what something is'.
    - action: Type a substring known to occur in one artifact (e.g. 'deep') into the search box.
      success: >
        The grid narrows to the cards whose combined id+title+description+body contains the
        substring (case-insensitive). Typing 'zzzqqq' replaces the grid with the 'No artifacts
        match.' empty state; clearing it restores the list.
    - action: Click an artifact card carrying a `doc:` reference (e.g. 'deep-modules').
      success: >
        The route becomes `#/asset/deep-modules` and the detail view renders the category chip +
        gloss in the header, the description lede, the markdown-rendered body, and a 'References'
        list with the cited ADR as an in-app link showing the doc's title (not the raw
        `doc:...` string).
    - action: Click that doc reference link.
      success: >
        The route becomes `#/doc/decisions%2F0002-...md` and read-corpus's DocView loads and
        renders that ADR as markdown in-app — proving the citation resolved to a real, reachable
        corpus document. (Honesty: the seed has 0 `asset:` refs, so this minimal test
        deliberately follows a `doc:` ref; the `asset:` branch is real but unexercised.)

contracts:
  - id: bl-category-filter-narrows-grid
    title: A category narrows the grid to that category's artifacts
    asserts: >
      Given a fixed asset list spanning multiple categories and query='', the Library filter
      memo with category='definition' returns exactly the assets whose category==='definition'
      (and excludes all others).
    covers: { file: apps/studio/src/components/Library.tsx, lines: "16-17" }
  - id: bl-search-substring-filters-across-fields
    title: Free-text search substring-matches across id+title+description+body
    asserts: >
      Given category=null and a non-empty query, the filter memo keeps exactly the assets whose
      lowercased `id title description body` haystack contains the lowercased trimmed query and
      drops the rest — proving a body-only / description-only hit, case-insensitively.
    covers: { file: apps/studio/src/components/Library.tsx, lines: "15,18-20" }
  - id: bl-chip-count-reflects-live-category-size
    title: Each category chip shows its live per-category count
    asserts: >
      Rendering the Library over a known assets array shows the 'all (N)' chip with
      N=assets.length and each category chip labelled '<cat> (n)' where n is the count of assets
      in that category.
    covers: { file: apps/studio/src/components/Library.tsx, lines: "44-45,47-58" }
  - id: bl-empty-category-chip-hidden
    title: A category with zero artifacts renders no chip
    asserts: >
      When the assets array contains zero artifacts of a given category, the Library renders no
      chip for that category (the `if (n === 0) return null` guard fires).
    covers: { file: apps/studio/src/components/Library.tsx, lines: "48-49" }
  - id: bl-empty-result-shows-empty-state
    title: A query matching nothing shows the empty-state message
    asserts: >
      When the category+query filter yields zero assets, the Library renders the 'No artifacts
      match.' message instead of the card grid.
    covers: { file: apps/studio/src/components/Library.tsx, lines: "76-77" }
  - id: bl-category-gloss-banner-on-narrow
    title: Selecting a category shows that category's one-line gloss
    asserts: >
      When category is non-null, the Library renders the gloss banner
      '<category> — <ASSET_CATEGORY_GLOSS[category]>'; when category is null, no gloss banner
      renders.
    covers: { file: apps/studio/src/components/Library.tsx, lines: "70-74" }
  - id: bl-library-route-category-guard
    title: The router maps #/library/<category> to a valid category or null
    asserts: >
      parseRoute('#/library/definition') yields {name:'library',category:'definition'},
      parseRoute('#/library') yields category:null, and parseRoute('#/library/bogus') yields
      category:null (the asCategory guard rejects non-members).
    covers: { file: apps/studio/src/lib/route.ts, lines: "15-17,22-25" }
  - id: bl-asset-route-parses-id
    title: The router maps #/asset/<id> to an asset route with the decoded id
    asserts: >
      parseRoute('#/asset/deep-modules') yields {name:'asset',id:'deep-modules'}, and a
      percent-encoded id round-trips via decodeURIComponent (distinct from the '/edit' and 'new'
      sub-routes).
    covers: { file: apps/studio/src/lib/route.ts, lines: "29-35" }
  - id: bl-assetview-renders-header-body-refs
    title: AssetView renders the resolved artifact's category gloss, body, and references
    asserts: >
      Given an assets list containing the requested id, AssetView renders the category chip with
      ASSET_CATEGORY_GLOSS as its gloss, the markdown body, and one References entry per
      reference; given an id absent from the list it renders the 'Artifact not found' box.
    covers: { file: apps/studio/src/components/AssetView.tsx, lines: "17,23-32,47-69" }
  - id: bl-reflink-resolves-known-doc-ref
    title: "RefLink renders a known doc: reference as an in-app doc link titled by the doc"
    asserts: >
      For refStr='doc:<relpath>' where docIds.has(relpath), RefLink renders an anchor to
      docHref(relpath) whose text is docTitles.get(relpath); for an unknown relpath it renders
      the '(unknown doc)' muted fallback instead of a link.
    covers: { file: apps/studio/src/components/AssetView.tsx, lines: "106-113" }
  - id: bl-reflink-resolves-known-asset-ref
    title: "RefLink renders a known asset: reference as an in-app artifact link"
    asserts: >
      For refStr='asset:<id>' where some asset has that id, RefLink renders an anchor to
      assetHref(id) titled by that asset's title; for an unknown id it renders the '(unknown
      asset)' muted fallback. HONESTY: this branch is unexercised by the seed (0 asset: refs),
      so this contract proves real-but-unseeded code.
    covers: { file: apps/studio/src/components/AssetView.tsx, lines: "114-122" }
