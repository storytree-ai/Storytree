name: CI

# The green gate, and (for PRs) the merge that follows it — ADR-0022.
# Runs on every PR into main and on direct pushes to main. workflow_dispatch exists for the
# post-merge full-suite backstop (ADR-0195 §5): the automerge job's GITHUB_TOKEN merge cannot
# trigger the push run (GitHub anti-recursion — same reason the deploy dispatch exists), so after
# an affected-only merge it dispatches a full run on main here instead. A dispatched run takes the
# full `-r` path (the affected step is PR-only).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# A new push to the same PR/branch supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # The gate. Tests are offline (no DB / no API key), so CI needs no secrets.
  # ---------------------------------------------------------------------------
  verify:
    name: verify
    runs-on: ubuntu-latest
    # The affected-scope decision ('full' | 'affected'; empty on push/dispatch runs, where the
    # step is skipped) — read by the automerge job's post-merge backstop dispatch (ADR-0195 §5).
    outputs:
      mode: ${{ steps.affected.outputs.mode }}
    # contents: read for checkout; pull-requests: read for the ADR cross-PR collision check (ADR-0050).
    permissions:
      contents: read
      pull-requests: read
    steps:
      # legacy/Agentic is a private submodule and not part of the pnpm workspace,
      # so the default no-submodule checkout is correct (and avoids needing creds).
      # fetch-depth 2 keeps the PR merge commit's FIRST PARENT (the base tip the merge was cut
      # against) available — the affected-scope step below diffs HEAD^1..HEAD (ADR-0195).
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # ADR-number collision check across OPEN PRs (ADR-0050, Layer 2). The adr-health
      # `adr-number-unique` gate (in `pnpm -r test` below) catches a number already on main / on this
      # merge ref; this fast PR-only step additionally catches a truly-concurrent pair before either
      # merges. Fail-OPEN on gh/network errors, fail-CLOSED only on a real clash (the script's contract).
      - name: ADR number collision (open PRs)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/adr-pr-collision-check.sh

      # A branch is ONE landed unit — it dies on merge (ADR-0142). The merge job below clears the
      # merged branch's board state (presence + node_claim) keyed on the head ref, so re-landing the
      # same branch name would erase live sessions from the map and feed the stale-PR trap family.
      # Refuse a PR whose head branch already has a merged PR. Fail-open on gh errors, like the ADR
      # collision check above.
      - name: Merged-branch guard (a branch dies on merge)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/merged-branch-guard.sh

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Repo-surface allow-list (the `repo-surface-allowlist` guardrail): refuse
      # unlisted root entries / loose docs so temp/ad-hoc junk can't merge.
      - name: Repo manifest
        run: pnpm check:manifest

      # Organism boundary (ADR-0074): the real cross-organism code-dependency graph must be a
      # subgraph of the declared cross-story `depends_on` graph (substrate/ports excepted). Refuses
      # an undeclared cross-story coupling or a dependency cycle — so coupling can't be added without
      # a declared edge, which the studio forest then renders (no invisible coupling).
      - name: Organism boundary
        run: pnpm check:boundaries

      # CLAUDE.md's operating-discipline region is a GENERATED VIEW of the
      # `session-orchestrator` library agent (ADR-0051) — fail if it has drifted
      # from the artifact (edit the artifact + `pnpm build:claude`, don't hand-edit).
      - name: CLAUDE.md in sync
        run: pnpm check:claude

      # .claude/agents/*.md are GENERATED subagent files — a view of the delegatable library
      # agents (ADR-0052). Fail if they have drifted (edit the agent artifact + `pnpm build:agents`).
      - name: .claude/agents in sync
        run: pnpm check:agents

      # apps/studio/data/assets.json is a GENERATED VIEW of knowledge.json (build-corpus.mjs). Fail if
      # it has drifted from the structured source — a stale assets.json could otherwise merge clean
      # (ADR-0120, finding 3a; docs/glossary.md was a second generated view, retired by ADR-0135).
      # DB-free, like the checks above.
      - name: Corpus views in sync
        run: pnpm check:corpus-build

      # Process↔entrypoint bijection (ADR-0154): every `process` names a real CLI/pnpm entrypoint in
      # its `surfaces`, and every operator-facing entrypoint has a process behind it. ADVISORY — it
      # WARNs (the backfill worklist) but ALWAYS exits 0, so it never blocks the gate. DB-free (reads
      # the seed + root package.json), so unlike the local-only DB-backed sync checks it runs in CI
      # too, honouring ADR-0154's "runs local + CI".
      - name: Surface coverage (advisory)
        run: pnpm check:surface-coverage

      # Clone the PINNED web submodule so the grounding check validates the exact vendored site.
      # storytree-web is PUBLIC, so this needs no creds (unlike the private legacy/Agentic, which is
      # why the checkout above takes no submodules). ADR-0056.
      - name: Check out the pinned web submodule
        run: |
          sha=$(git ls-tree HEAD web | awk '{print $3}')
          if [ -z "$sha" ]; then echo "no web gitlink in HEAD"; exit 1; fi
          rm -rf web
          git clone --quiet https://github.com/storytree-ai/storytree-web.git web
          git -C web checkout --quiet "$sha"

      # The public site's load-bearing claims carry data-grounds="ADR-…" refs; fail if any cites a
      # missing or superseded ADR — the doctrine-drift guard (ADR-0056). storytree-web can't
      # self-check; only this repo sees the ADR corpus.
      - name: web claims grounded
        run: pnpm check:web-grounding

      # The site consumes the shared forest-world render core as a SYNCED @generated artifact
      # (web/src/lib/forest-world/), not as private source — ADR-0093 Decision 3. Fail if that copy
      # has drifted from packages/forest-world (re-sync with `pnpm sync:web-engine` + bump the
      # submodule). SKIPs while the pinned site hasn't adopted the core yet (no forest-world/ dir) —
      # the render-core twin of `check:web-grounding`, needs the cloned web/ above.
      - name: web engine in sync
        run: pnpm check:web-engine

      # The two-act experience's rollout guard (ADR-0134, stories/website-experience): an
      # experience entry page (one carrying data-experience-entry) must keep the skip +
      # reduced-motion/no-WebGL affordance markers and a WebGL-free Act 1 static closure.
      # SKIPs while the pinned site hasn't adopted the experience — the guard lands before
      # the storm. Needs the cloned web/ above.
      - name: web experience guarded
        run: pnpm check:web-experience

      # Affected-only PR scope (ADR-0195, amends ADR-0022): classify the PR's changed files and,
      # when every one maps cleanly into the workspace graph, narrow typecheck+test to the changed
      # projects PLUS their dependents (pnpm's `--filter "...<name>"`). Conservative by
      # construction — any root-path file (stories/**, docs/decisions/**, scripts/**, lockfile, …),
      # any package.json, or the cross-boundary corpus seed (apps/studio/data/**) forces the full
      # `-r` run, because those inputs are read by tests the dependency graph can't see. The
      # push-to-main run below never narrows (`|| '-r'` when this step is skipped) — the backstop
      # that keeps main green if a PR gate ever under-selects; fix forward from there.
      - name: Affected scope (PRs only)
        id: affected
        if: github.event_name == 'pull_request'
        run: pnpm ci:affected

      - name: Typecheck
        run: pnpm ${{ steps.affected.outputs.pnpm_args || '-r' }} typecheck

      # @storytree/core corpus validation + the node:test suites across packages.
      # This is the gate per CLAUDE.md ("Gate: pnpm -r typecheck · pnpm -r test") — scoped to the
      # affected projects on PRs (ADR-0195), full on pushes to main.
      - name: Test
        run: pnpm ${{ steps.affected.outputs.pnpm_args || '-r' }} test

      # The only buildable target is apps/studio (`vite build`); the packages
      # export raw TS and have no build step. studio's `vite build` used to fail
      # because its dev API pulled the Node-only store substrate into config load;
      # that store import is now lazy, so the gate verifies the client build too.
      - name: Build
        run: pnpm -r build

  # ---------------------------------------------------------------------------
  # Auto-merge-on-green, done inside free Actions (GitHub-native auto-merge is
  # paywalled on private repos). Runs only for PRs, only after `verify` passes.
  # Opt out of a given PR by marking it a draft or adding the `hold` label.
  # ---------------------------------------------------------------------------
  automerge:
    name: automerge
    needs: verify
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'hold')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # mint the WIF OIDC token for keyless GCP auth (presence-retire below)
      actions: write # dispatch deploy-studio.yml after a studio-affecting merge (ADR-0061)
    steps:
      - name: Merge now that the gate is green
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh pr merge ${{ github.event.pull_request.number }}
          --repo ${{ github.repository }}
          --merge
          --delete-branch

      # -----------------------------------------------------------------------
      # Presence merge-retire backstop (ADR-0033 / ADR-0041) + possibly-dead sweep
      # (ADR-0079). The merge that just landed IS the authoritative "this session's
      # work is done" fact — the one the racy SessionEnd hook misses when a fresh
      # worktree is deleted before it fires. So retire the merged session's
      # `events.session` presence row here — and then sweep ALL possibly-dead active
      # rows (ADR-0079), since the one-shot retire above can't catch sessions that
      # re-declared after their merge, merged under a different branch, or never
      # merged. The sweep reuses this same pool — no extra auth/IAM/cron.
      #
      # EVERYTHING below is FAIL-SOFT: every step is `continue-on-error: true` and
      # the writer itself never exits non-zero. The merge already happened and
      # presence is advisory (ADR-0033) — this must NEVER fail the merge job.
      #
      # Gated on a `claude/*` head ref: only agent sessions have presence rows, so
      # non-session merges skip the GCP/DB spin-up entirely (done() would no-op on
      # them regardless). Auth is keyless WIF (ADR-0021) — no JSON key in a secret.
      # -----------------------------------------------------------------------
      - name: Stamp merge time
        id: merge_stamp
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        run: echo "at=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" >> "$GITHUB_OUTPUT"

      - name: Checkout (for the presence writer)
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        uses: actions/checkout@v6

      - name: Authenticate to GCP (keyless WIF — ADR-0021)
        id: gcp_auth
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          # The pool + provider + CI service account are provisioned by infra/ci-presence.tf
          # (owner runs `terraform apply` once — see infra/ci-presence.md). The full provider
          # resource name embeds the project NUMBER (635716509357), not the project id.
          workload_identity_provider: projects/635716509357/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: storytree-ci-presence@storytree-498613.iam.gserviceaccount.com

      - name: Set up pnpm
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        run: pnpm install --frozen-lockfile

      # Also releases the merged branch's node_claim story-claims (ADR-0138 §4 — the guaranteed
      # machine clear of the wisp-claim, keyed on the head-ref branch). Fail-soft, same writer.
      - name: Retire the merged session + release its claims + sweep possibly-dead rows (fail-soft)
        if: startsWith(github.event.pull_request.head.ref, 'claude/')
        continue-on-error: true
        env:
          # The CI service account's Cloud SQL IAM username (the `.iam` short form —
          # Cloud SQL truncates `.gserviceaccount.com`, mirroring the studio host).
          STORYTREE_DB_USER: storytree-ci-presence@storytree-498613.iam
          STORYTREE_MERGED_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          STORYTREE_MERGED_AT: ${{ steps.merge_stamp.outputs.at }}
        # Package-scoped exec resolves the workspace's pinned tsx (a @storytree/notice-board devDep) —
        # `npx tsx` from root would download tsx fresh (no root .bin in this pnpm workspace).
        # ADR-0077: the merge-ingest writer moved into the notice-board organism's ./store subpath.
        run: pnpm --filter @storytree/notice-board exec tsx src/store/ingest-merge.ts

      # -----------------------------------------------------------------------
      # Full-suite backstop on merged main (ADR-0195 §5). The GITHUB_TOKEN merge
      # above cannot trigger ci.yml's own push run (GitHub anti-recursion — the
      # same rule the deploy dispatch below works around), so when this PR's
      # verify ran AFFECTED-ONLY, dispatch a full run on main to prove the merged
      # tree whole. Skipped when verify ran the full suite on the merge ref —
      # that run IS the full proof (ADR-0022's model), and a second one would
      # spend the minutes the affected scope just saved. Fail-soft: a missed
      # dispatch degrades the backstop to the next full-scoped run on main, and
      # must never block the LOUD deploy dispatch below (which stays LAST).
      # -----------------------------------------------------------------------
      - name: Dispatch full CI on main after an affected-only merge (ADR-0195)
        if: needs.verify.outputs.mode == 'affected'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref main --repo ${{ github.repository }}

      # -----------------------------------------------------------------------
      # CD trigger for auto-merged studio changes (ADR-0061, amends ADR-0046).
      #
      # The GITHUB_TOKEN merge above does NOT cascade the push-triggered
      # deploy-studio.yml (GitHub anti-recursion), so a studio change that
      # AUTO-merges would silently not deploy. `workflow_dispatch` is the
      # documented exception — it fires even from GITHUB_TOKEN given the
      # `actions: write` scope granted on this job — and a dispatch on `--ref
      # main` runs as a `refs/heads/main` OIDC token, which the deploy SA's
      # main-scoped WIF binding (infra/studio-cd.tf) already accepts. So this
      # closes the gap with NO new secret and NO new IAM. Gated to the ADR-0046
      # studio-affecting path set so a non-studio merge doesn't deploy.
      #
      # MUST stay the LAST step in this job. Unlike the fail-soft presence-retire
      # above, a missed deploy is the bug being fixed, so this is deliberately
      # LOUD (no continue-on-error). The presence steps default to if: success(),
      # so a dispatch failure here must not be able to skip them — keeping it last
      # guarantees that. Runs for every auto-merged PR (not just `claude/*`); the
      # path gate, not a branch gate, decides whether to deploy.
      # -----------------------------------------------------------------------
      - name: Dispatch studio deploy on a studio-affecting merge (ADR-0061)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The PR record (and its file list) persists after the merge above.
          files=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json files --jq '.files[].path')
          echo "Merged PR touched:"; echo "$files"
          # The ADR-0046 studio-affecting path set (mirrors deploy-studio.yml's paths:).
          if echo "$files" | grep -qE '^(apps/studio/|packages/|docs/|stories/|pnpm-lock\.yaml$|package\.json$|infra/studio-cloudbuild\.yaml$|\.github/workflows/deploy-studio\.yml$)'; then
            echo "Studio-affecting — dispatching deploy-studio.yml on main."
            gh workflow run deploy-studio.yml --ref main --repo ${{ github.repository }}
          else
            echo "No studio-affecting paths — skipping deploy dispatch."
          fi
