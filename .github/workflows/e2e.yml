name: e2e-desktop

# Electron end-to-end tests for the storytree desktop app (apps/desktop/e2e/*.e2e.mjs).
#
# WHY A SEPARATE WORKFLOW (not part of ci.yml's `verify`): these specs need the BUILT studio dist +
# the Electron main + a real (headed) Electron Chromium under a virtual display — heavier and slower
# than the offline `pnpm -r test` gate, and the regression they guard (forest-map pointer capture)
# reproduces ONLY in Electron. Keeping them here means:
#   • NON-BLOCKING for now — ci.yml's `automerge` needs only `verify`, so a red/flaky e2e run never
#     blocks a merge. Promote to a required check (or add to automerge's `needs`) once it's proven
#     stable over a stretch of runs. (The specs themselves are offline + deterministic — they stub
#     every /api/* call, so no DB or secrets are needed; see apps/desktop/e2e/harness.mjs.)
#   • PATH-SCOPED — only runs when the desktop, the studio it bundles, the shared packages, or this
#     workflow change, so doc-only / unrelated PRs don't pay the Electron build cost.

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/studio/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/studio/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"

# A new push to the same PR/branch supersedes an in-flight run.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-desktop:
    name: e2e-desktop
    runs-on: ubuntu-latest
    # The official Playwright image carries every system lib Electron's Chromium needs PLUS xvfb —
    # far more robust than apt-get'ing the (frequently-renamed, e.g. the 24.04 `t64`) deps by hand.
    # Pin to the playwright-core version in apps/desktop/package.json so the runtime matches.
    container: mcr.microsoft.com/playwright:v1.61.1-jammy
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      # The container runs as root, where Electron refuses the SUID sandbox; disable it for CI (a
      # headless test runner, not a user-facing browser). Inherited by the launched Electron because
      # the spec spreads process.env into _electron.launch's env.
      ELECTRON_DISABLE_SANDBOX: "1"
      # Belt-and-braces: never let electron's install.js skip the binary download (the real failure was
      # its extract step, fixed in the install step below — but a skipped download would also break it).
      ELECTRON_SKIP_BINARY_DOWNLOAD: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Electron binary download (@electron/get's cache) so re-runs don't re-fetch ~100MB.
      # Keyed on the runner OS + the pinned electron version, so a version bump busts it.
      - name: Cache the Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-33.4.11

      # Install the Electron binary, then VERIFY it resolves — without this `_electron.launch` throws the
      # opaque "Electron failed to install correctly". Electron's postinstall DOWNLOADS the platform zip
      # fine (into ~/.cache/electron), but its bundled extract-zip step silently produces an INCOMPLETE
      # dist on Node 24 in this container (only icudtl.dat — no binary, no path.txt — yet exits 0). So we
      # let install.js fetch the zip, then EXTRACT IT OURSELVES with python3 (the image ships python3 but
      # not unzip/bsdtar), make the binary executable (python's zipfile drops the exec bit), and write the
      # path.txt index.js reads. Proven against this exact image. Scoped to this job — the verify/deploy
      # jobs never launch Electron, so they skip the ~100MB binary entirely.
      - name: Install + verify the Electron binary
        working-directory: apps/desktop
        run: |
          set -e
          ED="$(node -p "require('path').dirname(require.resolve('electron/package.json'))")"
          echo "electron package dir: $ED"
          node "$ED/install.js" >/dev/null 2>&1 || true   # fetches the zip to ~/.cache/electron (extract is the broken part)
          ZIP="$(find "$HOME/.cache/electron" -name '*.zip' | head -1)"
          test -n "$ZIP" || { echo "::error::electron binary zip was not downloaded to ~/.cache/electron"; exit 1; }
          echo "extracting $ZIP"
          rm -rf "$ED/dist"; mkdir -p "$ED/dist"
          python3 -m zipfile -e "$ZIP" "$ED/dist/"
          chmod +x "$ED/dist/electron"
          printf electron > "$ED/path.txt"
          node -e "const fs=require('fs');const ep=require('electron');console.log('resolved electron binary:',ep);if(!fs.existsSync(ep)){console.error('::error::electron binary missing at '+ep);process.exit(1)}"
          echo "electron binary verified"

      # Builds the studio dist + the Electron main (apps/desktop `pretest:e2e`), then runs the specs
      # under a virtual X server (Electron is a headed app, so it needs a display even "headless").
      # The specs are offline (stubbed /api/*) — no DB, no secrets.
      - name: Run desktop E2E (xvfb + headless Electron)
        run: xvfb-run -a pnpm --filter desktop test:e2e
